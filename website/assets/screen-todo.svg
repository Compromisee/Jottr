<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600" role="img" aria-label="Jottr todo list">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0b14"/>
      <stop offset="100%" stop-color="#11111c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#b69bff"/>
    </linearGradient>
  </defs>
  <rect width="900" height="600" fill="url(#bg)"/>
  <rect x="0" y="0" width="900" height="40" fill="#0e0e18" stroke="rgba(255,255,255,0.06)"/>
  <g transform="translate(12,12)">
    <rect width="16" height="16" rx="4" fill="url(#accent)"/>
    <text x="24" y="13" font-family="Inter, system-ui" font-size="13" font-weight="600" fill="#e8e8f0">Jottr</text>
  </g>
  <rect x="0" y="40" width="220" height="535" fill="rgba(15,15,24,0.7)" stroke="rgba(255,255,255,0.06)"/>

  <!-- todo surface -->
  <g transform="translate(260,80)">
    <text font-family="JetBrains Mono, monospace" font-size="14" fill="#b69bff">**todolist**</text>
    <text y="28" font-family="JetBrains Mono, monospace" font-size="14" fill="#6a6a82"></text>

    <!-- items -->
    <g font-family="Inter" font-size="15" fill="#e8e8f0">
      <!-- done -->
      <g transform="translate(0,70)">
        <rect width="280" height="40" rx="8" fill="rgba(88,225,168,0.10)"/>
        <rect x="14" y="13" width="18" height="18" rx="5" fill="#58e1a8"/>
        <path d="M19 23 L23 27 L29 19" stroke="#0b3a28" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="46" y="26" fill="#1f6e4a" text-decoration="line-through">Write the README</text>
      </g>
      <!-- done -->
      <g transform="translate(0,120)">
        <rect width="280" height="40" rx="8" fill="rgba(88,225,168,0.10)"/>
        <rect x="14" y="13" width="18" height="18" rx="5" fill="#58e1a8"/>
        <path d="M19 23 L23 27 L29 19" stroke="#0b3a28" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="46" y="26" fill="#1f6e4a" text-decoration="line-through">Package the installer</text>
      </g>
      <!-- active -->
      <g transform="translate(0,170)">
        <rect width="280" height="40" rx="8" fill="rgba(255,255,255,0.02)"/>
        <rect x="14" y="13" width="18" height="18" rx="5" fill="transparent" stroke="#6a6a82" stroke-width="1.5"/>
        <text x="46" y="26" fill="#e8e8f0">Ship the v1.0 release</text>
      </g>
      <!-- active -->
      <g transform="translate(0,220)">
        <rect width="280" height="40" rx="8" fill="rgba(255,255,255,0.02)"/>
        <rect x="14" y="13" width="18" height="18" rx="5" fill="transparent" stroke="#6a6a82" stroke-width="1.5"/>
        <text x="46" y="26" fill="#e8e8f0">Write a blog post</text>
      </g>
      <!-- focused -->
      <g transform="translate(0,270)">
        <rect width="280" height="40" rx="8" fill="rgba(124,92,255,0.10)" stroke="rgba(124,92,255,0.4)"/>
        <rect x="14" y="13" width="18" height="18" rx="5" fill="transparent" stroke="#6a6a82" stroke-width="1.5"/>
        <text x="46" y="26" fill="#e8e8f0">Tweet about it</text>
        <line x1="160" y1="14" x2="160" y2="32" stroke="#7c5cff" stroke-width="1.5"/>
      </g>
    </g>
  </g>

  <rect x="0" y="575" width="900" height="25" fill="rgba(11,11,20,0.85)" stroke="rgba(255,255,255,0.06)"/>
  <g font-family="Inter" font-size="11" fill="#9c9cb0">
    <text x="14" y="592">todo.md - checklist</text>
    <text x="700" y="592" fill="#58e1a8">Saved just now</text>
    <text x="800" y="592">4 / 6 done</text>
  </g>
</svg>
