<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Text Remover</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }
        .container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            margin-top: 15px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 14px;
            resize: vertical;
        }
        .options {
            margin: 15px 0;
            display: flex;
            gap: 20px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: normal;
            cursor: pointer;
            margin: 0;
        }
        button {
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0077ed;
        }
        .output-container {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e8e8ed;
            color: #1d1d1f;
            padding: 6px 12px;
            font-size: 12px;
            width: auto;
        }
        .copy-btn:hover {
            background: #d2d2d7;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Line Text Remover</h2>

    <label for="removalText">Phrase or Symbol to Remove:</label>
    <input type="text" id="removalText" placeholder="Enter text, symbol, or character to delete...">

    <div class="options">
        <label class="checkbox-label">
            <input type="checkbox" id="caseInsensitive" checked> Case-insensitive
        </label>
        <label class="checkbox-label">
            <input type="checkbox" id="trimLines"> Trim empty spaces from line edges
        </label>
    </div>

    <label for="inputText">Input Text:</label>
    <textarea id="inputText" placeholder="Paste your target text here..."></textarea>

    <button onclick="processText()" style="margin: 15px 0;">Remove Phrase From All Lines</button>

    <div class="output-container">
        <label for="outputText">Output Text:</label>
        <button class="copy-btn" onclick="copyOutput()">Copy</button>
        <textarea id="outputText" readonly placeholder="Cleaned text will appear here..."></textarea>
    </div>
</div>

<script>
    function processText() {
        const target = document.getElementById('removalText').value;
        const input = document.getElementById('inputText').value;
        const caseInsensitive = document.getElementById('caseInsensitive').checked;
        const trimLines = document.getElementById('trimLines').checked;

        if (!input) {
            document.getElementById('outputText').value = "";
            return;
        }

        // Split text into individual lines
        const lines = input.split(/\r?\n/);

        // Escape special regex characters if a target is provided
        let regex;
        if (target) {
            const escapedTarget = target.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
            const flags = caseInsensitive ? 'gi' : 'g';
            regex = new RegExp(escapedTarget, flags);
        }

        const processedLines = lines.map(line => {
            let newLine = line;
            // Remove the target phrase globally from the line
            if (regex) {
                newLine = newLine.replace(regex, '');
            }
            // Optional trim
            if (trimLines) {
                newLine = newLine.trim();
            }
            return newLine;
        });

        // Rejoin lines
        document.getElementById('outputText').value = processedLines.join('\n');
    }

    function copyOutput() {
        const outputText = document.getElementById('outputText');
        if (!outputText.value) return;

        outputText.select();
        outputText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(outputText.value);

        const copyBtn = document.querySelector('.copy-btn');
        copyBtn.innerText = 'Copied!';
        setTimeout(() => { copyBtn.innerText = 'Copy'; }, 2000);
    }
</script>

</body>
</html>
